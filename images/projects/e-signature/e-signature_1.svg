<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <clipPath id="clip1"><rect width="960" height="540"/></clipPath>
  </defs>
  <rect width="960" height="540" fill="#0a192f"/>
  <!-- Watermark -->
  <text x="24" y="36" fill="rgba(100,255,218,0.15)" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Confidential</text>
  <!-- Top bar -->
  <rect x="0" y="0" width="960" height="56" fill="#112240"/>
  <text x="40" y="35" fill="#64ffda" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">E-Sign</text>
  <text x="860" y="35" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="13">admin@company.kr</text>
  <!-- Step indicator -->
  <g transform="translate(480, 95)" text-anchor="middle">
    <!-- Step 1 active -->
    <circle cx="-270" cy="0" r="14" fill="#64ffda"/>
    <text x="-270" y="5" fill="#0a192f" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" text-anchor="middle">1</text>
    <text x="-270" y="24" fill="#64ffda" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">문서업로드</text>
    <line x1="-252" y1="0" x2="-108" y2="0" stroke="#233554" stroke-width="2"/>
    <!-- Step 2 -->
    <circle cx="-90" cy="0" r="14" fill="none" stroke="#233554" stroke-width="2"/>
    <text x="-90" y="5" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">2</text>
    <text x="-90" y="24" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">서명자설정</text>
    <line x1="-72" y1="0" x2="72" y2="0" stroke="#233554" stroke-width="2"/>
    <!-- Step 3 -->
    <circle cx="90" cy="0" r="14" fill="none" stroke="#233554" stroke-width="2"/>
    <text x="90" y="5" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">3</text>
    <text x="90" y="24" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">서명위치</text>
    <line x1="108" y1="0" x2="252" y2="0" stroke="#233554" stroke-width="2"/>
    <!-- Step 4 -->
    <circle cx="270" cy="0" r="14" fill="none" stroke="#233554" stroke-width="2"/>
    <text x="270" y="5" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">4</text>
    <text x="270" y="24" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11" text-anchor="middle">발송</text>
  </g>
  <!-- Upload area (dashed border) -->
  <rect x="230" y="140" width="500" height="200" rx="12" fill="none" stroke="#64ffda" stroke-width="2" stroke-dasharray="10 6" opacity="0.5"/>
  <g transform="translate(480, 210)" text-anchor="middle">
    <!-- Upload icon -->
    <line x1="0" y1="-20" x2="0" y2="10" stroke="#64ffda" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="-10,-10 0,-20 10,-10" fill="none" stroke="#64ffda" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-18" y1="14" x2="18" y2="14" stroke="#64ffda" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="42" fill="#ccd6f6" font-family="system-ui, -apple-system, sans-serif" font-size="15">파일을 여기에 끌어다 놓으세요</text>
    <text x="0" y="64" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="12">또는</text>
    <!-- File select button -->
    <rect x="-60" y="74" width="120" height="34" rx="6" fill="#64ffda"/>
    <text x="0" y="96" fill="#0a192f" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" text-anchor="middle">파일 선택</text>
  </g>
  <!-- Supported formats -->
  <text x="480" y="360" text-anchor="middle" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="12">지원 형식: PDF, DOCX  |  최대 50MB</text>
  <!-- Recent documents section -->
  <text x="230" y="400" fill="#ccd6f6" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">최근 문서</text>
  <!-- Doc 1 -->
  <rect x="230" y="412" width="500" height="32" rx="4" fill="#233554"/>
  <rect x="240" y="418" width="18" height="20" rx="2" fill="none" stroke="#64ffda" stroke-width="1.2"/>
  <text x="268" y="433" fill="#ccd6f6" font-family="system-ui, -apple-system, sans-serif" font-size="12">업무위탁계약서_2026.pdf</text>
  <text x="640" y="433" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11">2026-04-10</text>
  <!-- Doc 2 -->
  <rect x="230" y="450" width="500" height="32" rx="4" fill="#1a2d4a"/>
  <rect x="240" y="456" width="18" height="20" rx="2" fill="none" stroke="#64ffda" stroke-width="1.2"/>
  <text x="268" y="471" fill="#ccd6f6" font-family="system-ui, -apple-system, sans-serif" font-size="12">NDA_협력사_에버그린.docx</text>
  <text x="640" y="471" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11">2026-04-08</text>
  <!-- Doc 3 -->
  <rect x="230" y="488" width="500" height="32" rx="4" fill="#233554"/>
  <rect x="240" y="494" width="18" height="20" rx="2" fill="none" stroke="#64ffda" stroke-width="1.2"/>
  <text x="268" y="509" fill="#ccd6f6" font-family="system-ui, -apple-system, sans-serif" font-size="12">프리랜서_용역계약서.pdf</text>
  <text x="640" y="509" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11">2026-04-05</text>
</svg>