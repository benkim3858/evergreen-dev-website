<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <clipPath id="phoneClip4">
      <rect x="330" y="20" width="300" height="500" rx="20"/>
    </clipPath>
  </defs>
  <rect width="960" height="540" fill="#0a192f"/>
  <text x="20" y="30" font-family="sans-serif" font-size="11" fill="rgba(100,255,218,0.15)" font-weight="bold">Confidential</text>
  <!-- Phone frame -->
  <rect x="330" y="20" width="300" height="500" rx="20" fill="#112240" stroke="#233554" stroke-width="2"/>
  <!-- Status bar -->
  <rect x="330" y="20" width="300" height="28" rx="20" fill="#0a192f" clip-path="url(#phoneClip4)"/>
  <text x="480" y="38" font-family="sans-serif" font-size="10" fill="#8892b0" text-anchor="middle">9:41</text>
  <!-- Header -->
  <rect x="330" y="48" width="300" height="40" fill="#112240" clip-path="url(#phoneClip4)"/>
  <text x="352" y="74" font-family="sans-serif" font-size="14" fill="#8892b0">&lt;</text>
  <text x="480" y="74" font-family="sans-serif" font-size="14" fill="#ccd6f6" font-weight="bold" text-anchor="middle">Checkout</text>
  <line x1="330" y1="88" x2="630" y2="88" stroke="#233554" stroke-width="1"/>
  <!-- Order summary -->
  <text x="350" y="110" font-family="sans-serif" font-size="12" fill="#ccd6f6" font-weight="bold">Order Summary</text>
  <!-- Item 1 -->
  <rect x="350" y="120" width="260" height="60" rx="6" fill="#233554"/>
  <rect x="358" y="128" width="44" height="44" rx="4" fill="#1a3050"/>
  <rect x="368" y="138" width="24" height="24" rx="2" fill="none" stroke="#8892b0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="380" y="154" font-family="sans-serif" font-size="7" fill="#8892b0" text-anchor="middle">IMG</text>
  <text x="412" y="144" font-family="sans-serif" font-size="11" fill="#ccd6f6">Hanwoo Sirloin 300g</text>
  <text x="412" y="160" font-family="sans-serif" font-size="10" fill="#8892b0">Qty: 2</text>
  <text x="600" y="152" font-family="sans-serif" font-size="12" fill="#ccd6f6" text-anchor="end">W 90,000</text>
  <!-- Item 2 -->
  <rect x="350" y="186" width="260" height="60" rx="6" fill="#233554"/>
  <rect x="358" y="194" width="44" height="44" rx="4" fill="#1a3050"/>
  <rect x="368" y="204" width="24" height="24" rx="2" fill="none" stroke="#8892b0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="380" y="220" font-family="sans-serif" font-size="7" fill="#8892b0" text-anchor="middle">IMG</text>
  <text x="412" y="210" font-family="sans-serif" font-size="11" fill="#ccd6f6">Organic Spinach 1kg</text>
  <text x="412" y="226" font-family="sans-serif" font-size="10" fill="#8892b0">Qty: 1</text>
  <text x="600" y="218" font-family="sans-serif" font-size="12" fill="#ccd6f6" text-anchor="end">W 5,500</text>
  <!-- Divider -->
  <line x1="350" y1="258" x2="610" y2="258" stroke="#233554" stroke-width="1"/>
  <!-- Coupon section -->
  <text x="350" y="278" font-family="sans-serif" font-size="12" fill="#ccd6f6" font-weight="bold">Coupon</text>
  <rect x="350" y="286" width="260" height="36" rx="6" fill="#233554"/>
  <text x="366" y="308" font-family="sans-serif" font-size="11" fill="#8892b0">Enter coupon code</text>
  <rect x="556" y="290" width="48" height="28" rx="4" fill="#1a3050"/>
  <text x="580" y="308" font-family="sans-serif" font-size="10" fill="#64ffda" text-anchor="middle">Apply</text>
  <!-- Divider -->
  <line x1="350" y1="332" x2="610" y2="332" stroke="#233554" stroke-width="1"/>
  <!-- Payment method -->
  <text x="350" y="352" font-family="sans-serif" font-size="12" fill="#ccd6f6" font-weight="bold">Payment Method</text>
  <!-- Credit card option -->
  <rect x="350" y="362" width="126" height="44" rx="6" fill="#233554" stroke="#64ffda" stroke-width="1.5"/>
  <rect x="362" y="374" width="22" height="16" rx="3" fill="none" stroke="#64ffda" stroke-width="1.2"/>
  <line x1="362" y1="380" x2="384" y2="380" stroke="#64ffda" stroke-width="0.8"/>
  <text x="390" y="386" font-family="sans-serif" font-size="10" fill="#64ffda">Credit Card</text>
  <!-- Easy pay option -->
  <rect x="484" y="362" width="126" height="44" rx="6" fill="#233554"/>
  <circle cx="504" cy="384" r="8" fill="none" stroke="#8892b0" stroke-width="1.2"/>
  <text x="504" y="388" font-family="sans-serif" font-size="8" fill="#8892b0" text-anchor="middle">P</text>
  <text x="518" y="388" font-family="sans-serif" font-size="10" fill="#8892b0">Easy Pay</text>
  <!-- Divider -->
  <line x1="350" y1="418" x2="610" y2="418" stroke="#233554" stroke-width="1"/>
  <!-- Price breakdown -->
  <text x="350" y="438" font-family="sans-serif" font-size="11" fill="#8892b0">Subtotal</text>
  <text x="610" y="438" font-family="sans-serif" font-size="11" fill="#ccd6f6" text-anchor="end">W 95,500</text>
  <text x="350" y="456" font-family="sans-serif" font-size="11" fill="#8892b0">Delivery</text>
  <text x="610" y="456" font-family="sans-serif" font-size="11" fill="#ccd6f6" text-anchor="end">W 3,000</text>
  <text x="350" y="474" font-family="sans-serif" font-size="11" fill="#8892b0">Discount</text>
  <text x="610" y="474" font-family="sans-serif" font-size="11" fill="#ff6b8a" text-anchor="end">- W 0</text>
  <line x1="350" y1="480" x2="610" y2="480" stroke="#233554" stroke-width="1"/>
  <text x="350" y="498" font-family="sans-serif" font-size="13" fill="#ccd6f6" font-weight="bold">Total</text>
  <text x="610" y="498" font-family="sans-serif" font-size="15" fill="#64ffda" font-weight="bold" text-anchor="end">W 98,500</text>
  <!-- Pay button - outside phone for visibility or at bottom of phone -->
  <!-- Title label -->
  <text x="480" y="14" font-family="sans-serif" font-size="13" fill="#8892b0" text-anchor="middle">Payment Flow - Mobile App</text>
</svg>