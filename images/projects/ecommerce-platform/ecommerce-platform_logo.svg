<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#4af3ff"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="50%" stop-color="#4af3ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#4af3ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0"/>
      <stop offset="30%" stop-color="#64ffda" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#4af3ff" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#0a192f"/>

  <!-- Symbol: Shopping Bag + Digital Grid -->
  <g transform="translate(480, 195)">

    <!-- Bag body — geometric/minimal -->
    <path d="M-38 -18 L-44 52 C-44 56 -41 60 -37 60 L37 60 C41 60 44 56 44 52 L38 -18 Z"
          fill="none" stroke="url(#bagGrad)" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Bag handle — elegant arc -->
    <path d="M-18 -18 C-18 -48 18 -48 18 -18"
          fill="none" stroke="url(#handleGrad)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Digital grid lines inside bag -->
    <g opacity="0.25" stroke="#4af3ff" stroke-width="0.8">
      <line x1="-32" y1="2" x2="32" y2="2"/>
      <line x1="-34" y1="18" x2="34" y2="18"/>
      <line x1="-36" y1="34" x2="36" y2="34"/>
      <line x1="-12" y1="-14" x2="-16" y2="56"/>
      <line x1="12" y1="-14" x2="16" y2="56"/>
    </g>

    <!-- Data nodes at grid intersections -->
    <g fill="#64ffda">
      <circle cx="-12" cy="2" r="2.2" opacity="0.9"/>
      <circle cx="12" cy="2" r="2.2" opacity="0.9"/>
      <circle cx="-14" cy="18" r="1.8" opacity="0.7"/>
      <circle cx="14" cy="18" r="1.8" opacity="0.7"/>
      <circle cx="0" cy="34" r="2.5" opacity="1"/>
    </g>

    <!-- Accent node -->
    <circle cx="0" cy="34" r="2.5" fill="#a78bfa" opacity="0.8"/>

    <!-- Small pixel squares — digital motif -->
    <g fill="#4af3ff" opacity="0.5">
      <rect x="-30" y="6" width="4" height="4" rx="0.5"/>
      <rect x="26" y="6" width="4" height="4" rx="0.5"/>
      <rect x="-32" y="22" width="4" height="4" rx="0.5"/>
      <rect x="28" y="22" width="4" height="4" rx="0.5"/>
    </g>

    <!-- Purple accent pixels -->
    <g fill="#a78bfa" opacity="0.4">
      <rect x="-28" y="38" width="3" height="3" rx="0.5"/>
      <rect x="25" y="38" width="3" height="3" rx="0.5"/>
      <rect x="20" y="6" width="3" height="3" rx="0.5"/>
    </g>

    <!-- Connection lines from nodes — data flow suggestion -->
    <g stroke="#64ffda" stroke-width="0.6" opacity="0.3" stroke-dasharray="2 2">
      <line x1="-12" y1="2" x2="-30" y2="-10"/>
      <line x1="12" y1="2" x2="30" y2="-10"/>
      <line x1="0" y1="34" x2="0" y2="50"/>
    </g>

    <!-- Outer orbit dots — tech/data aesthetic -->
    <circle cx="-52" cy="20" r="1.5" fill="#4af3ff" opacity="0.35"/>
    <circle cx="52" cy="20" r="1.5" fill="#4af3ff" opacity="0.35"/>
    <circle cx="-48" cy="-8" r="1" fill="#a78bfa" opacity="0.3"/>
    <circle cx="48" cy="-8" r="1" fill="#a78bfa" opacity="0.3"/>
  </g>

  <!-- Brand text -->
  <text x="480" y="325"
        text-anchor="middle"
        fill="#ccd6f6"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28"
        font-weight="300"
        letter-spacing="8">E-Commerce Platform</text>

  <!-- Divider line -->
  <line x1="340" y1="348" x2="620" y2="348"
        stroke="url(#dividerGrad)" stroke-width="1"/>

  <!-- Sub text -->
  <text x="480" y="372"
        text-anchor="middle"
        fill="#8892b0"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14"
        font-weight="300"
        letter-spacing="3">Confidential Client Project</text>
</svg>