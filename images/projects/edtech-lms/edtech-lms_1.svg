<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <clipPath id="videoClip"><rect x="40" y="60" width="600" height="338" rx="6"/></clipPath>
  </defs>
  <!-- Background -->
  <rect width="960" height="540" fill="#0a192f"/>
  <!-- Watermark -->
  <text x="30" y="30" fill="rgba(100,255,218,0.15)" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Confidential</text>
  <!-- Top bar -->
  <rect x="0" y="0" width="960" height="44" fill="#112240"/>
  <text x="30" y="28" fill="#64ffda" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">EduStream LMS</text>
  <rect x="750" y="12" width="60" height="20" rx="4" fill="#233554"/>
  <text x="780" y="26" text-anchor="middle" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="10">My Page</text>
  <rect x="820" y="12" width="50" height="20" rx="4" fill="#233554"/>
  <text x="845" y="26" text-anchor="middle" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="10">Logout</text>
  <circle cx="900" cy="22" r="12" fill="#233554"/>
  <text x="900" y="26" text-anchor="middle" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="10">K</text>

  <!-- Main Video Player -->
  <rect x="40" y="60" width="600" height="338" rx="6" fill="#112240"/>
  <!-- Play button -->
  <circle cx="340" cy="229" r="30" fill="rgba(100,255,218,0.2)" stroke="#64ffda" stroke-width="2"/>
  <polygon points="330,214 330,244 358,229" fill="#64ffda"/>
  <!-- Progress bar -->
  <rect x="40" y="380" width="600" height="4" rx="2" fill="#233554"/>
  <rect x="40" y="380" width="240" height="4" rx="2" fill="#64ffda"/>
  <!-- Video controls -->
  <rect x="40" y="390" width="600" height="30" rx="0" fill="#112240"/>
  <polygon points="52,400 52,414 64,407" fill="#8892b0"/>
  <rect x="74" y="402" width="14" height="10" rx="1" fill="#8892b0"/>
  <text x="100" y="412" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11">12:34 / 1:28:00</text>
  <text x="580" y="412" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11">HD</text>
  <rect x="610" y="400" width="18" height="12" rx="2" fill="none" stroke="#8892b0" stroke-width="1.5"/>

  <!-- Video info -->
  <text x="40" y="445" fill="#ccd6f6" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600">Python 데이터 분석 실전 마스터 클래스</text>
  <text x="40" y="468" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="13">김민수 강사</text>
  <!-- Live badge -->
  <rect x="130" y="456" width="44" height="18" rx="9" fill="#e63946"/>
  <text x="152" y="469" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">LIVE</text>
  <!-- Viewers -->
  <circle cx="210" cy="464" r="6" fill="none" stroke="#8892b0" stroke-width="1.2"/>
  <circle cx="210" cy="462" r="2.5" fill="#8892b0"/>
  <path d="M204,468 Q210,472 216,468" fill="none" stroke="#8892b0" stroke-width="1.2"/>
  <text x="224" y="469" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="12">1,247명 시청 중</text>

  <!-- Download button -->
  <rect x="40" y="490" width="160" height="34" rx="6" fill="#233554"/>
  <text x="120" y="512" text-anchor="middle" fill="#64ffda" font-family="system-ui, -apple-system, sans-serif" font-size="12">강의 자료 다운로드</text>
  <rect x="220" y="490" width="120" height="34" rx="6" fill="#233554"/>
  <text x="280" y="512" text-anchor="middle" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="12">노트 작성</text>

  <!-- Right Panel - Chat -->
  <rect x="660" y="60" width="270" height="460" rx="6" fill="#112240"/>
  <rect x="660" y="60" width="270" height="36" rx="6" fill="#233554"/>
  <rect x="845" y="60" width="85" height="36" rx="6" fill="#233554"/>
  <text x="795" y="83" text-anchor="middle" fill="#ccd6f6" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">실시간 채팅</text>
  <text x="710" y="83" fill="#64ffda" font-family="system-ui, -apple-system, sans-serif" font-size="11">128명</text>

  <!-- Chat messages -->
  <circle cx="680" cy="118" r="10" fill="#233554"/><text x="680" y="122" text-anchor="middle" fill="#64ffda" font-family="system-ui, -apple-system, sans-serif" font-size="9">A</text>
  <text x="696" y="114" fill="#64ffda" font-family="system-ui, -apple-system, sans-serif" font-size="10">이수진</text>
  <text x="696" y="128" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11">판다스 merge 부분 다시 설명해주세요!</text>

  <circle cx="680" cy="160" r="10" fill="#233554"/><text x="680" y="164" text-anchor="middle" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="9">B</text>
  <text x="696" y="156" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="10">박준형</text>
  <text x="696" y="170" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11">이번 강의 진짜 유익하네요 ^^</text>

  <circle cx="680" cy="202" r="10" fill="#233554"/><text x="680" y="206" text-anchor="middle" fill="#4af3ff" font-family="system-ui, -apple-system, sans-serif" font-size="9">C</text>
  <text x="696" y="198" fill="#4af3ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">최다은</text>
  <text x="696" y="212" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11">groupby 예제 코드 공유 가능할까요?</text>

  <circle cx="680" cy="244" r="10" fill="#233554"/><text x="680" y="248" text-anchor="middle" fill="#64ffda" font-family="system-ui, -apple-system, sans-serif" font-size="9">D</text>
  <text x="696" y="240" fill="#64ffda" font-family="system-ui, -apple-system, sans-serif" font-size="10">김태호</text>
  <text x="696" y="254" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11">matplotlib 시각화도 다뤄주세요!</text>

  <circle cx="680" cy="286" r="10" fill="#233554"/><text x="680" y="290" text-anchor="middle" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="9">E</text>
  <text x="696" y="282" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="10">윤서연</text>
  <text x="696" y="296" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11">강사님 마이크 소리가 작아요</text>

  <circle cx="680" cy="328" r="10" fill="#233554"/><text x="680" y="332" text-anchor="middle" fill="#4af3ff" font-family="system-ui, -apple-system, sans-serif" font-size="9">F</text>
  <text x="696" y="324" fill="#4af3ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">정민혁</text>
  <text x="696" y="338" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="11">실시간 코딩 너무 좋습니다!</text>

  <!-- Chat input -->
  <rect x="670" y="486" width="210" height="28" rx="14" fill="#233554"/>
  <text x="686" y="504" fill="#4a5568" font-family="system-ui, -apple-system, sans-serif" font-size="11">메시지를 입력하세요...</text>
  <rect x="890" y="486" width="30" height="28" rx="14" fill="#64ffda"/>
  <text x="905" y="504" text-anchor="middle" fill="#0a192f" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">></text>
</svg>