<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <clipPath id="screen2">
      <rect x="305" y="30" width="350" height="480" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#0a192f"/>

  <!-- Confidential Watermark -->
  <text x="30" y="40" fill="rgba(100,255,218,0.15)" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Confidential</text>

  <!-- Phone Frame -->
  <rect x="305" y="30" width="350" height="480" rx="24" fill="#112240" stroke="#233554" stroke-width="2"/>

  <!-- Status Bar -->
  <rect x="305" y="30" width="350" height="36" rx="24" fill="#1a2f4a" clip-path="url(#screen2)"/>
  <text x="480" y="53" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="11">9:41</text>

  <!-- Header -->
  <rect x="305" y="66" width="350" height="56" fill="#0a192f" clip-path="url(#screen2)"/>
  <text x="345" y="96" fill="#8892b0" font-family="system-ui, sans-serif" font-size="16">&lt;</text>
  <text x="480" y="90" text-anchor="middle" fill="#64ffda" font-family="system-ui, sans-serif" font-size="18" font-weight="700">3건</text>
  <text x="480" y="110" text-anchor="middle" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="13">의 상품을 찾았습니다</text>

  <!-- Divider -->
  <line x1="320" y1="122" x2="640" y2="122" stroke="#233554" stroke-width="1"/>

  <!-- Card 1 (Recommended) -->
  <rect x="325" y="132" width="310" height="108" rx="10" fill="#233554" stroke="#64ffda" stroke-width="1.5"/>
  <!-- Recommend Badge -->
  <rect x="331" y="126" width="44" height="18" rx="4" fill="#64ffda"/>
  <text x="353" y="138" text-anchor="middle" fill="#0a192f" font-family="system-ui, sans-serif" font-size="10" font-weight="700">추천</text>
  <!-- Card 1 Content -->
  <rect x="340" y="146" width="80" height="14" rx="3" fill="#1a2f4a"/>
  <text x="380" y="157" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="10">금융사 A</text>
  <text x="340" y="178" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="11">금리</text>
  <text x="390" y="178" fill="#64ffda" font-family="system-ui, sans-serif" font-size="14" font-weight="700">4.2%</text>
  <text x="460" y="178" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="11">한도</text>
  <text x="500" y="178" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="13" font-weight="600">7,000만</text>
  <text x="340" y="198" fill="#8892b0" font-family="system-ui, sans-serif" font-size="10">원리금균등 | 중도상환수수료 없음</text>
  <rect x="540" y="210" width="80" height="24" rx="6" fill="none" stroke="#64ffda" stroke-width="1"/>
  <text x="580" y="226" text-anchor="middle" fill="#64ffda" font-family="system-ui, sans-serif" font-size="11">상세보기</text>

  <!-- Card 2 -->
  <rect x="325" y="250" width="310" height="100" rx="10" fill="#233554" stroke="#2d4a6f" stroke-width="1"/>
  <rect x="340" y="264" width="80" height="14" rx="3" fill="#1a2f4a"/>
  <text x="380" y="275" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="10">금융사 B</text>
  <text x="340" y="296" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="11">금리</text>
  <text x="390" y="296" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="14" font-weight="600">5.1%</text>
  <text x="460" y="296" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="11">한도</text>
  <text x="500" y="296" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="13" font-weight="600">1억</text>
  <text x="340" y="316" fill="#8892b0" font-family="system-ui, sans-serif" font-size="10">원금균등 | 신용점수 우대</text>
  <rect x="540" y="324" width="80" height="24" rx="6" fill="none" stroke="#8892b0" stroke-width="1"/>
  <text x="580" y="340" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="11">상세보기</text>

  <!-- Card 3 -->
  <rect x="325" y="360" width="310" height="100" rx="10" fill="#233554" stroke="#2d4a6f" stroke-width="1"/>
  <rect x="340" y="374" width="80" height="14" rx="3" fill="#1a2f4a"/>
  <text x="380" y="385" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="10">금융사 C</text>
  <text x="340" y="406" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="11">금리</text>
  <text x="390" y="406" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="14" font-weight="600">5.8%</text>
  <text x="460" y="406" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="11">한도</text>
  <text x="500" y="406" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="13" font-weight="600">5,000만</text>
  <text x="340" y="426" fill="#8892b0" font-family="system-ui, sans-serif" font-size="10">만기일시 | 서류 간소화</text>
  <rect x="540" y="434" width="80" height="24" rx="6" fill="none" stroke="#8892b0" stroke-width="1"/>
  <text x="580" y="450" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="11">상세보기</text>

  <!-- Bottom Bar -->
  <rect x="305" y="470" width="350" height="40" rx="0" fill="#0a192f" clip-path="url(#screen2)"/>
  <text x="400" y="494" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="10">조건 수정</text>
  <text x="480" y="494" text-anchor="middle" fill="#64ffda" font-family="system-ui, sans-serif" font-size="10" font-weight="600">비교 결과</text>
  <text x="560" y="494" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="10">내 신청</text>
</svg>