<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <!-- Main gradient: mint to cyan -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#4af3ff"/>
    </linearGradient>
    <!-- Accent gradient: cyan to purple -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4af3ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Signature stroke gradient -->
    <linearGradient id="sigGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="50%" stop-color="#4af3ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Subtle glow -->
    <radialGradient id="glowGrad" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#64ffda" stop-opacity="0"/>
    </radialGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#0a192f"/>

  <!-- Subtle ambient glow behind symbol -->
  <ellipse cx="480" cy="200" rx="180" ry="140" fill="url(#glowGrad)"/>

  <!-- Symbol group centered -->
  <g transform="translate(480, 195)">

    <!-- Document silhouette -->
    <path d="M-38,-72 L22,-72 L38,-56 L38,72 L-38,72 Z"
          fill="none" stroke="url(#mainGrad)" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- Document fold corner -->
    <path d="M22,-72 L22,-56 L38,-56"
          fill="none" stroke="url(#mainGrad)" stroke-width="2.2" stroke-linejoin="round"/>
    <!-- Document fold fill -->
    <path d="M22,-72 L22,-56 L38,-56 Z"
          fill="#0a192f" stroke="none"/>
    <path d="M22,-72 L22,-56 L38,-56"
          fill="none" stroke="url(#mainGrad)" stroke-width="2.2" stroke-linejoin="round"/>

    <!-- Document lines (content) -->
    <line x1="-22" y1="-48" x2="14" y2="-48" stroke="#4af3ff" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
    <line x1="-22" y1="-38" x2="22" y2="-38" stroke="#4af3ff" stroke-width="1.5" stroke-opacity="0.3" stroke-linecap="round"/>
    <line x1="-22" y1="-28" x2="18" y2="-28" stroke="#4af3ff" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round"/>
    <line x1="-22" y1="-18" x2="10" y2="-18" stroke="#4af3ff" stroke-width="1.5" stroke-opacity="0.2" stroke-linecap="round"/>

    <!-- Signature line (base) -->
    <line x1="-20" y1="28" x2="26" y2="28" stroke="#64ffda" stroke-width="1" stroke-opacity="0.3" stroke-linecap="round" stroke-dasharray="2,3"/>

    <!-- Signature curve (pen stroke) -->
    <path d="M-18,24 C-12,10 -4,30 4,16 C8,10 12,26 18,14 C21,8 24,18 28,12"
          fill="none" stroke="url(#sigGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Pen nib -->
    <g transform="translate(32, 6) rotate(-30)">
      <path d="M0,0 L-3,-14 L0,-18 L3,-14 Z"
            fill="url(#accentGrad)" fill-opacity="0.7" stroke="none"/>
      <line x1="0" y1="0" x2="0" y2="2" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Checkmark circle (bottom-right) -->
    <g transform="translate(48, 56)">
      <circle cx="0" cy="0" r="16" fill="#0a192f" stroke="url(#mainGrad)" stroke-width="2"/>
      <path d="M-7,0 L-2,5 L7,-5"
            fill="none" stroke="#64ffda" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Small shield icon (top-left, subtle security element) -->
    <g transform="translate(-48, -62)" opacity="0.55">
      <path d="M0,-12 L-9,-6 L-9,2 C-9,8 -4,13 0,15 C4,13 9,8 9,2 L9,-6 Z"
            fill="none" stroke="url(#shieldGrad)" stroke-width="1.5" stroke-linejoin="round"/>
      <!-- Small lock keyhole inside shield -->
      <circle cx="0" cy="0" r="2.5" fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-opacity="0.5"/>
      <line x1="0" y1="2" x2="0" y2="5" stroke="#a78bfa" stroke-width="1.2" stroke-opacity="0.5" stroke-linecap="round"/>
    </g>

  </g>

  <!-- Service name text -->
  <text x="480" y="330"
        text-anchor="middle"
        fill="#ccd6f6"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="28"
        font-weight="300"
        letter-spacing="8">E-Signature Service</text>

  <!-- Confidential Client Project -->
  <text x="480" y="358"
        text-anchor="middle"
        fill="#8892b0"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14"
        font-weight="400"
        letter-spacing="3">Confidential Client Project</text>

  <!-- Subtle decorative line under texts -->
  <line x1="400" y1="375" x2="560" y2="375"
        stroke="url(#sigGrad)" stroke-width="0.5" stroke-opacity="0.3"/>

</svg>
