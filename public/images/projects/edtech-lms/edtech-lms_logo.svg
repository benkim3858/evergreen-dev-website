<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <!-- Main gradient: mint to cyan -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#4af3ff"/>
    </linearGradient>
    <!-- Accent gradient: cyan to purple -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4af3ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Play button gradient -->
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#4af3ff"/>
    </linearGradient>
    <!-- Subtle glow -->
    <radialGradient id="glowBg" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a192f" stop-opacity="0"/>
    </radialGradient>
    <!-- Symbol glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Soft shadow for depth -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="shadow"/>
      <feFlood flood-color="#64ffda" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="shadow" operator="in" result="colorShadow"/>
      <feComposite in="SourceGraphic" in2="colorShadow" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#0a192f"/>
  <!-- Ambient glow -->
  <rect width="960" height="540" fill="url(#glowBg)"/>

  <!-- Main symbol group centered -->
  <g transform="translate(480, 200)" filter="url(#softShadow)">

    <!-- Outer rounded rectangle frame (video/screen frame) -->
    <rect x="-72" y="-50" width="144" height="100" rx="14" ry="14"
          fill="none" stroke="url(#mainGrad)" stroke-width="2.5" opacity="0.9"/>

    <!-- Inner screen area subtle fill -->
    <rect x="-66" y="-44" width="132" height="88" rx="10" ry="10"
          fill="#0a192f" stroke="none"/>
    <rect x="-66" y="-44" width="132" height="88" rx="10" ry="10"
          fill="#64ffda" fill-opacity="0.03" stroke="none"/>

    <!-- Play triangle (centered, slightly left-offset for optical center) -->
    <polygon points="-16,-22 -16,22 24,0"
             fill="url(#playGrad)" opacity="0.9"/>

    <!-- Growth arrow: rising from top-right of frame -->
    <g stroke="url(#accentGrad)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Arrow path going upward -->
      <polyline points="38,-10 50,-26 62,-18 76,-42"/>
      <!-- Arrowhead -->
      <polyline points="68,-42 76,-42 76,-34"/>
    </g>

    <!-- Small decorative dots (data/learning nodes) -->
    <circle cx="-52" cy="36" r="2.5" fill="#a78bfa" opacity="0.6"/>
    <circle cx="-40" cy="36" r="2.5" fill="#4af3ff" opacity="0.6"/>
    <circle cx="-28" cy="36" r="2.5" fill="#64ffda" opacity="0.6"/>

    <!-- Graduation cap hint: small abstract cap above frame -->
    <g transform="translate(0, -62)" opacity="0.7">
      <!-- Cap base (diamond shape) -->
      <polygon points="0,-8 18,0 0,8 -18,0" fill="none" stroke="#a78bfa" stroke-width="1.8"/>
      <!-- Tassel line -->
      <line x1="18" y1="0" x2="24" y2="10" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="24" cy="12" r="2" fill="#a78bfa"/>
    </g>

    <!-- Live indicator dot (top-left of frame) -->
    <circle cx="-58" cy="-38" r="4" fill="#64ffda" opacity="0.8"/>
    <circle cx="-58" cy="-38" r="4" fill="none" stroke="#64ffda" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="4;10;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Platform name -->
  <text x="480" y="330" text-anchor="middle"
        fill="#ccd6f6" font-family="system-ui, -apple-system, sans-serif"
        font-size="26" font-weight="300" letter-spacing="8">
    EdTech LMS Platform
  </text>

  <!-- Subtitle -->
  <text x="480" y="358" text-anchor="middle"
        fill="#8892b0" font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="300" letter-spacing="3">
    Confidential Client Project
  </text>

  <!-- Thin decorative line under text -->
  <line x1="400" y1="375" x2="560" y2="375" stroke="url(#mainGrad)" stroke-width="0.5" opacity="0.3"/>
</svg>
