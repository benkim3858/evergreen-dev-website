<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <clipPath id="screen1">
      <rect x="305" y="30" width="350" height="480" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#0a192f"/>

  <!-- Confidential Watermark -->
  <text x="30" y="40" fill="rgba(100,255,218,0.15)" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Confidential</text>

  <!-- Phone Frame -->
  <rect x="305" y="30" width="350" height="480" rx="24" fill="#112240" stroke="#233554" stroke-width="2"/>

  <!-- Status Bar -->
  <rect x="305" y="30" width="350" height="36" rx="24" fill="#1a2f4a" clip-path="url(#screen1)"/>
  <text x="480" y="53" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="11">9:41</text>
  <circle cx="610" cy="48" r="4" fill="none" stroke="#8892b0" stroke-width="1.5"/>
  <rect x="622" y="44" width="18" height="8" rx="2" fill="none" stroke="#8892b0" stroke-width="1.5"/>
  <rect x="624" y="46" width="10" height="4" rx="1" fill="#64ffda"/>

  <!-- Header -->
  <rect x="305" y="66" width="350" height="50" fill="#0a192f" clip-path="url(#screen1)"/>
  <text x="345" y="96" fill="#8892b0" font-family="system-ui, sans-serif" font-size="16">&lt;</text>
  <text x="480" y="97" text-anchor="middle" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="17" font-weight="600">대출 조건 입력</text>

  <!-- Divider -->
  <line x1="320" y1="116" x2="640" y2="116" stroke="#233554" stroke-width="1"/>

  <!-- Loan Amount Field -->
  <text x="340" y="145" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">대출 희망 금액</text>
  <text x="620" y="145" text-anchor="end" fill="#64ffda" font-family="system-ui, sans-serif" font-size="14" font-weight="600">5,000만원</text>

  <!-- Slider Track -->
  <rect x="340" y="158" width="280" height="6" rx="3" fill="#233554"/>
  <!-- Slider Fill -->
  <rect x="340" y="158" width="168" height="6" rx="3" fill="#64ffda"/>
  <!-- Slider Thumb -->
  <circle cx="508" cy="161" r="10" fill="#64ffda"/>
  <circle cx="508" cy="161" r="5" fill="#0a192f"/>

  <!-- Min/Max Labels -->
  <text x="340" y="183" fill="#8892b0" font-family="system-ui, sans-serif" font-size="10">500만</text>
  <text x="620" y="183" text-anchor="end" fill="#8892b0" font-family="system-ui, sans-serif" font-size="10">3억</text>

  <!-- Repayment Period -->
  <text x="340" y="215" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">상환 기간</text>
  <!-- Period Buttons -->
  <rect x="340" y="225" width="60" height="32" rx="6" fill="#233554" stroke="#233554" stroke-width="1"/>
  <text x="370" y="246" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">12개월</text>
  <rect x="408" y="225" width="60" height="32" rx="6" fill="#233554" stroke="#233554" stroke-width="1"/>
  <text x="438" y="246" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">24개월</text>
  <rect x="476" y="225" width="60" height="32" rx="6" fill="none" stroke="#64ffda" stroke-width="1.5"/>
  <text x="506" y="246" text-anchor="middle" fill="#64ffda" font-family="system-ui, sans-serif" font-size="12" font-weight="600">36개월</text>
  <rect x="544" y="225" width="60" height="32" rx="6" fill="#233554" stroke="#233554" stroke-width="1"/>
  <text x="574" y="246" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">60개월</text>

  <!-- Loan Purpose Dropdown -->
  <text x="340" y="285" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">대출 목적</text>
  <rect x="340" y="295" width="280" height="38" rx="8" fill="#233554" stroke="#2d4a6f" stroke-width="1"/>
  <text x="355" y="319" fill="#ccd6f6" font-family="system-ui, sans-serif" font-size="13">생활자금</text>
  <text x="605" y="319" fill="#8892b0" font-family="system-ui, sans-serif" font-size="14">v</text>

  <!-- Credit Grade -->
  <text x="340" y="360" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">신용등급</text>
  <!-- Grade Buttons Row 1 -->
  <rect x="340" y="370" width="48" height="32" rx="6" fill="#233554"/>
  <text x="364" y="391" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">1등급</text>
  <rect x="396" y="370" width="48" height="32" rx="6" fill="#233554"/>
  <text x="420" y="391" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">2등급</text>
  <rect x="452" y="370" width="48" height="32" rx="6" fill="none" stroke="#64ffda" stroke-width="1.5"/>
  <text x="476" y="391" text-anchor="middle" fill="#64ffda" font-family="system-ui, sans-serif" font-size="12" font-weight="600">3등급</text>
  <rect x="508" y="370" width="48" height="32" rx="6" fill="#233554"/>
  <text x="532" y="391" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">4등급</text>
  <rect x="564" y="370" width="48" height="32" rx="6" fill="#233554"/>
  <text x="588" y="391" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">5등급</text>
  <!-- Grade Buttons Row 2 -->
  <rect x="340" y="410" width="48" height="32" rx="6" fill="#233554"/>
  <text x="364" y="431" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">6등급</text>
  <rect x="396" y="410" width="48" height="32" rx="6" fill="#233554"/>
  <text x="420" y="431" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">7등급</text>
  <rect x="452" y="410" width="48" height="32" rx="6" fill="#233554"/>
  <text x="476" y="431" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">8등급</text>
  <rect x="508" y="410" width="48" height="32" rx="6" fill="#233554"/>
  <text x="532" y="431" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">9등급</text>
  <rect x="564" y="410" width="48" height="32" rx="6" fill="#233554"/>
  <text x="588" y="431" text-anchor="middle" fill="#8892b0" font-family="system-ui, sans-serif" font-size="12">10등급</text>

  <!-- CTA Button -->
  <rect x="340" y="458" width="280" height="44" rx="10" fill="#64ffda"/>
  <text x="480" y="485" text-anchor="middle" fill="#0a192f" font-family="system-ui, sans-serif" font-size="15" font-weight="700">조건 비교하기</text>
</svg>