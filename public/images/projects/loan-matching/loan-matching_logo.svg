<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <!-- Main gradient: mint to cyan -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#4af3ff"/>
    </linearGradient>
    <!-- Accent gradient: cyan to purple -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4af3ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Connection line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="50%" stop-color="#4af3ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Subtle glow for nodes -->
    <radialGradient id="glowLeft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#64ffda" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <!-- Center glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4af3ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4af3ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#0a192f"/>

  <!-- Subtle center ambient glow -->
  <circle cx="480" cy="200" r="180" fill="url(#centerGlow)"/>

  <!-- Symbol group centered -->
  <g transform="translate(480, 195)">

    <!-- Left node glow -->
    <circle cx="-72" cy="0" r="70" fill="url(#glowLeft)"/>
    <!-- Right node glow -->
    <circle cx="72" cy="0" r="70" fill="url(#glowRight)"/>

    <!-- Connection lines (3 parallel arcs) -->
    <path d="M-28,0 C-10,-18 10,-18 28,0" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.5"/>
    <path d="M-30,0 L30,0" fill="none" stroke="url(#lineGrad)" stroke-width="2" opacity="0.7"/>
    <path d="M-28,0 C-10,18 10,18 28,0" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.5"/>

    <!-- Small data dots on connection -->
    <circle cx="-8" cy="-10" r="1.5" fill="#4af3ff" opacity="0.8"/>
    <circle cx="0" cy="0" r="2" fill="#4af3ff" opacity="0.9"/>
    <circle cx="8" cy="10" r="1.5" fill="#4af3ff" opacity="0.8"/>

    <!-- Left node (Customer) - hexagonal circle -->
    <circle cx="-72" cy="0" r="38" fill="none" stroke="url(#mainGrad)" stroke-width="2"/>
    <circle cx="-72" cy="0" r="28" fill="none" stroke="#64ffda" stroke-width="1" opacity="0.3"/>
    <!-- Person icon inside left node -->
    <circle cx="-72" cy="-8" r="8" fill="none" stroke="#64ffda" stroke-width="1.8"/>
    <path d="M-86,14 C-86,4 -58,4 -58,14" fill="none" stroke="#64ffda" stroke-width="1.8"/>

    <!-- Right node (Financial Institution) - hexagonal circle -->
    <circle cx="72" cy="0" r="38" fill="none" stroke="url(#accentGrad)" stroke-width="2"/>
    <circle cx="72" cy="0" r="28" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <!-- Building/bank icon inside right node -->
    <path d="M60,-10 L72,-18 L84,-10" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linejoin="round"/>
    <line x1="62" y1="-10" x2="62" y2="6" stroke="#a78bfa" stroke-width="1.8"/>
    <line x1="72" y1="-10" x2="72" y2="6" stroke="#a78bfa" stroke-width="1.8"/>
    <line x1="82" y1="-10" x2="82" y2="6" stroke="#a78bfa" stroke-width="1.8"/>
    <line x1="58" y1="6" x2="86" y2="6" stroke="#a78bfa" stroke-width="1.8"/>
    <line x1="56" y1="12" x2="88" y2="12" stroke="#a78bfa" stroke-width="1.8"/>

    <!-- Won sign subtly integrated at center of connection -->
    <text x="0" y="38" text-anchor="middle" fill="#4af3ff" font-family="system-ui, sans-serif" font-size="16" font-weight="300" opacity="0.6">&#8361;</text>

    <!-- Outer orbit ring -->
    <ellipse cx="0" cy="0" rx="110" ry="50" fill="none" stroke="#64ffda" stroke-width="0.5" opacity="0.15" transform="rotate(-8)"/>
    <ellipse cx="0" cy="0" rx="120" ry="55" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.1" transform="rotate(5)"/>

    <!-- Small orbit dots -->
    <circle cx="-105" cy="18" r="2" fill="#64ffda" opacity="0.4"/>
    <circle cx="108" cy="-15" r="2" fill="#a78bfa" opacity="0.4"/>
    <circle cx="0" cy="-50" r="1.5" fill="#4af3ff" opacity="0.3"/>
  </g>

  <!-- Platform name text -->
  <text x="480" y="330" text-anchor="middle" fill="#ccd6f6" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="300" letter-spacing="8">Loan Matching Platform</text>

  <!-- Confidential client text -->
  <text x="480" y="358" text-anchor="middle" fill="#8892b0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="300" letter-spacing="2">Confidential Client Project</text>

  <!-- Subtle bottom accent line -->
  <line x1="400" y1="378" x2="560" y2="378" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0.3"/>
</svg>
